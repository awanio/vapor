---
- name: Update apt cache (Debian)
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install common packages (Debian)
  apt:
    name:
      - curl
      - apt-transport-https
      - ca-certificates
      - gnupg
    state: present
  when: ansible_os_family == "Debian"

- name: Install software-properties-common (Debian 12 and earlier)
  apt:
    name: software-properties-common
    state: present
  when:
    - ansible_os_family == "Debian"
    - ansible_distribution_major_version | int <= 12

- name: Remove software-properties-common (Debian 13+)
  apt:
    name: software-properties-common
    state: absent
  when:
    - ansible_os_family == "Debian"
    - ansible_distribution_major_version | int >= 13

- name: Install common packages (RedHat)
  yum:
    name:
      - curl
    state: present
  when: ansible_os_family == "RedHat"
